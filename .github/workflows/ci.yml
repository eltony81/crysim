name: CI
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    # shard.yml points at `../cryspace` / `../easy_expression_eval` (path
    # deps, so local development doesn't need a published shard release
    # for every change); checking out the three repos as siblings under
    # the same workspace root reproduces that layout here without having
    # to touch shard.yml.
    - uses: actions/checkout@v6
      with:
        path: crysim
    - uses: actions/checkout@v6
      with:
        repository: eltony81/cryspace
        path: cryspace
    - uses: actions/checkout@v6
      with:
        repository: eltony81/easy_expression_eval
        path: easy_expression_eval
    - uses: crystal-lang/install-crystal@v1
    - run: sudo apt-get update && sudo apt-get install -y libopenblas-dev liblapack-dev
    - run: cd crysim && shards install
    - run: cd crysim && crystal spec -Dopenblas
